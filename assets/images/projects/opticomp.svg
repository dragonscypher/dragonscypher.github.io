<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="60%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#120f00"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#ffd700" stroke-width="0.5">
    <line x1="80" y1="60" x2="80" y2="400"/><line x1="80" y1="400" x2="720" y2="400"/>
    <line x1="80" y1="330" x2="720" y2="330"/><line x1="80" y1="260" x2="720" y2="260"/>
    <line x1="80" y1="190" x2="720" y2="190"/><line x1="80" y1="120" x2="720" y2="120"/>
    <line x1="80" y1="60" x2="720" y2="60"/>
    <line x1="200" y1="60" x2="200" y2="400"/><line x1="320" y1="60" x2="320" y2="400"/>
    <line x1="440" y1="60" x2="440" y2="400"/><line x1="560" y1="60" x2="560" y2="400"/>
    <line x1="680" y1="60" x2="680" y2="400"/>
  </g>

  <!-- Optimization curve (descending convex) -->
  <g filter="url(#glow)">
    <path d="M80,80 Q140,82 200,100 Q260,125 320,170 Q380,225 440,280 Q500,330 560,360 Q620,382 680,392"
      fill="none" stroke="url(#curveGrad)" stroke-width="3"/>
    <!-- Data points on curve -->
    <circle cx="80" cy="80" r="6" fill="#ffd700"/>
    <circle cx="200" cy="100" r="5" fill="#ffd700" opacity="0.9"/>
    <circle cx="320" cy="170" r="5" fill="#ffd700" opacity="0.85"/>
    <circle cx="440" cy="280" r="5" fill="#ffd700" opacity="0.8"/>
    <circle cx="560" cy="360" r="5" fill="#ffd700" opacity="0.75"/>
    <circle cx="680" cy="392" r="5" fill="#ffd700" opacity="0.6"/>
    <!-- Vertical drop lines -->
    <g stroke="#ffd700" stroke-width="1" stroke-dasharray="3 3" opacity="0.3">
      <line x1="80" y1="80" x2="80" y2="400"/>
      <line x1="200" y1="100" x2="200" y2="400"/>
      <line x1="320" y1="170" x2="320" y2="400"/>
      <line x1="440" y1="280" x2="440" y2="400"/>
    </g>
  </g>

  <!-- Axis labels -->
  <text x="380" y="430" font-family="monospace" font-size="9" fill="#ffd700" opacity="0.5" text-anchor="middle">ITERATIONS</text>
  <text x="50" y="230" font-family="monospace" font-size="9" fill="#ffd700" opacity="0.5" text-anchor="middle" transform="rotate(-90 50 230)">COST</text>

  <!-- Algorithm nodes (branch visualization, right side) -->
  <g transform="translate(540, 80)" opacity="0.7">
    <!-- Root -->
    <circle cx="80" cy="20" r="8" fill="none" stroke="#ff8c00" stroke-width="1.5"/>
    <text x="80" y="24" font-family="monospace" font-size="7" fill="#ff8c00" text-anchor="middle">GA</text>
    <!-- Branch 1 -->
    <line x1="80" y1="28" x2="40" y2="55" stroke="#ff8c00" stroke-width="1" opacity="0.6"/>
    <circle cx="40" cy="63" r="7" fill="none" stroke="#ff8c00" stroke-width="1.2"/>
    <text x="40" y="67" font-family="monospace" font-size="6" fill="#ff8c00" text-anchor="middle">SA</text>
    <!-- Branch 2 -->
    <line x1="80" y1="28" x2="120" y2="55" stroke="#ff8c00" stroke-width="1" opacity="0.6"/>
    <circle cx="120" cy="63" r="7" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <text x="120" y="67" font-family="monospace" font-size="6" fill="#ffd700" text-anchor="middle">PSO</text>
    <!-- Branch 1 children -->
    <line x1="40" y1="70" x2="20" y2="96" stroke="#ff8c00" stroke-width="0.8" opacity="0.5"/>
    <circle cx="20" cy="104" r="6" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="70" x2="60" y2="96" stroke="#ff8c00" stroke-width="0.8" opacity="0.5"/>
    <circle cx="60" cy="104" r="6" fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.8"/>
    <!-- Branch 2 children -->
    <line x1="120" y1="70" x2="100" y2="96" stroke="#ff8c00" stroke-width="0.8" opacity="0.5"/>
    <circle cx="100" cy="104" r="6" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.6"/>
    <line x1="120" y1="70" x2="140" y2="96" stroke="#ff8c00" stroke-width="0.8" opacity="0.5"/>
    <circle cx="140" cy="104" r="6" fill="none" stroke="#ff8c00" stroke-width="1" opacity="0.5"/>
    <!-- Best node highlight -->
    <circle cx="60" cy="104" r="10" fill="#ffd700" opacity="0.15"/>
  </g>

  <!-- Resource allocation grid (bottom-left area) -->
  <g transform="translate(80, 310)" opacity="0.6">
    <text x="0" y="-8" font-family="monospace" font-size="8" fill="#ffd700" opacity="0.6">ALLOCATION</text>
    <g>
      <!-- Grid of resource cells -->
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#ffd700" opacity="0.8"/>
      <rect x="24" y="0" width="20" height="20" rx="2" fill="#ffd700" opacity="0.6"/>
      <rect x="48" y="0" width="20" height="20" rx="2" fill="#ff8c00" opacity="0.4"/>
      <rect x="72" y="0" width="20" height="20" rx="2" fill="#ffd700" opacity="0.7"/>
      <rect x="0" y="24" width="20" height="20" rx="2" fill="#ff8c00" opacity="0.5"/>
      <rect x="24" y="24" width="20" height="20" rx="2" fill="#ffd700" opacity="0.9"/>
      <rect x="48" y="24" width="20" height="20" rx="2" fill="#ffd700" opacity="0.5"/>
      <rect x="72" y="24" width="20" height="20" rx="2" fill="#ff8c00" opacity="0.3"/>
      <rect x="0" y="48" width="20" height="20" rx="2" fill="#ffd700" opacity="0.4"/>
      <rect x="24" y="48" width="20" height="20" rx="2" fill="#ff8c00" opacity="0.3"/>
      <rect x="48" y="48" width="20" height="20" rx="2" fill="#ffd700" opacity="0.7"/>
      <rect x="72" y="48" width="20" height="20" rx="2" fill="#ffd700" opacity="0.5"/>
    </g>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#ffd700" opacity="0.6" letter-spacing="2">OPTICOMP</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">COMPUTATIONAL OPTIMIZATION TOOLKIT</text>
  <line x1="40" y1="375" x2="120" y2="375" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
</svg>
