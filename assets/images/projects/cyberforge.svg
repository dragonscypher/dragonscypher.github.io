<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07000f"/>
      <stop offset="60%" stop-color="#130025"/>
      <stop offset="100%" stop-color="#0a0018"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7b2cf8"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Cyber grid -->
  <g opacity="0.08" stroke="#7b2cf8" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- GPU chip outline -->
  <g transform="translate(80, 110)" opacity="0.85">
    <rect x="0" y="0" width="200" height="200" rx="12" fill="none" stroke="#7b2cf8" stroke-width="2"/>
    <rect x="16" y="16" width="168" height="168" rx="8" fill="#130025" opacity="0.8"/>
    <!-- Chip internals -->
    <rect x="40" y="40" width="120" height="120" rx="4" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
    <rect x="56" y="56" width="88" height="88" rx="3" fill="none" stroke="#7b2cf8" stroke-width="1" opacity="0.6"/>
    <!-- Core blocks -->
    <rect x="64" y="64" width="28" height="28" rx="2" fill="#7b2cf8" opacity="0.4"/>
    <rect x="100" y="64" width="28" height="28" rx="2" fill="#7b2cf8" opacity="0.4"/>
    <rect x="64" y="100" width="28" height="28" rx="2" fill="#00ffff" opacity="0.2"/>
    <rect x="100" y="100" width="28" height="28" rx="2" fill="#00ffff" opacity="0.3"/>
    <!-- Pins -->
    <g stroke="#7b2cf8" stroke-width="1.5" opacity="0.5">
      <line x1="-12" y1="50" x2="0" y2="50"/><line x1="-12" y1="80" x2="0" y2="80"/>
      <line x1="-12" y1="110" x2="0" y2="110"/><line x1="-12" y1="140" x2="0" y2="140"/>
      <line x1="200" y1="50" x2="212" y2="50"/><line x1="200" y1="80" x2="212" y2="80"/>
      <line x1="200" y1="110" x2="212" y2="110"/><line x1="200" y1="140" x2="212" y2="140"/>
    </g>
  </g>

  <!-- Benchmark bars (right panel) -->
  <g transform="translate(340, 100)" filter="url(#glow)">
    <text x="0" y="-10" font-family="system-ui,sans-serif" font-size="9" fill="#00ffff" opacity="0.6" letter-spacing="1">BENCHMARK</text>
    <!-- Bars -->
    <g>
      <rect x="0" y="10" width="80" height="14" rx="3" fill="url(#barGrad)" opacity="0.9"/>
      <rect x="0" y="34" width="110" height="14" rx="3" fill="url(#barGrad)" opacity="0.8"/>
      <rect x="0" y="58" width="65" height="14" rx="3" fill="url(#barGrad)" opacity="0.7"/>
      <rect x="0" y="82" width="140" height="14" rx="3" fill="url(#barGrad)" opacity="0.9"/>
      <rect x="0" y="106" width="90" height="14" rx="3" fill="url(#barGrad)" opacity="0.75"/>
      <rect x="0" y="130" width="120" height="14" rx="3" fill="url(#barGrad)" opacity="0.85"/>
      <!-- Labels -->
      <text x="88" y="21" font-family="system-ui,sans-serif" font-size="8" fill="#00ffff" opacity="0.7">Q4</text>
      <text x="118" y="45" font-family="system-ui,sans-serif" font-size="8" fill="#00ffff" opacity="0.7">INT8</text>
      <text x="73" y="69" font-family="system-ui,sans-serif" font-size="8" fill="#00ffff" opacity="0.7">FP16</text>
      <text x="148" y="93" font-family="system-ui,sans-serif" font-size="8" fill="#7b2cf8" opacity="0.9">FP32</text>
      <text x="98" y="117" font-family="system-ui,sans-serif" font-size="8" fill="#00ffff" opacity="0.7">AWQ</text>
      <text x="128" y="141" font-family="system-ui,sans-serif" font-size="8" fill="#00ffff" opacity="0.7">GGUF</text>
    </g>
  </g>

  <!-- Model cards (right side) -->
  <g transform="translate(560, 100)" opacity="0.8">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="none" stroke="#7b2cf8" stroke-width="1"/>
    <rect x="8" y="10" width="100" height="6" rx="3" fill="#7b2cf8" opacity="0.6"/>
    <rect x="8" y="24" width="70" height="4" rx="2" fill="#7b2cf8" opacity="0.4"/>
    <rect x="8" y="36" width="84" height="4" rx="2" fill="#00ffff" opacity="0.3"/>
    <rect x="0" y="74" width="180" height="60" rx="6" fill="none" stroke="#00ffff" stroke-width="1"/>
    <rect x="8" y="84" width="110" height="6" rx="3" fill="#00ffff" opacity="0.5"/>
    <rect x="8" y="98" width="80" height="4" rx="2" fill="#00ffff" opacity="0.35"/>
    <rect x="8" y="110" width="90" height="4" rx="2" fill="#7b2cf8" opacity="0.3"/>
    <rect x="0" y="148" width="180" height="60" rx="6" fill="none" stroke="#7b2cf8" stroke-width="1" opacity="0.7"/>
    <rect x="8" y="158" width="95" height="6" rx="3" fill="#7b2cf8" opacity="0.5"/>
    <rect x="8" y="172" width="65" height="4" rx="2" fill="#7b2cf8" opacity="0.3"/>
    <rect x="8" y="184" width="75" height="4" rx="2" fill="#00ffff" opacity="0.25"/>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#7b2cf8" opacity="0.7" letter-spacing="2">CYBERFORGE</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">LOCAL AI MODEL WORKBENCH</text>
  <line x1="40" y1="375" x2="130" y2="375" stroke="#7b2cf8" stroke-width="1.5" opacity="0.5"/>
</svg>
