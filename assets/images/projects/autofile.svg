<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00050f"/>
      <stop offset="60%" stop-color="#001a3a"/>
      <stop offset="100%" stop-color="#000d24"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0080ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#0080ff" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="133" y1="0" x2="133" y2="450"/><line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/><line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Resume document (left) -->
  <g transform="translate(50, 90)" opacity="0.9">
    <rect x="0" y="0" width="140" height="190" rx="6" fill="#001a3a" stroke="#0080ff" stroke-width="1.5"/>
    <rect x="12" y="16" width="116" height="8" rx="4" fill="#0080ff" opacity="0.7"/>
    <rect x="12" y="34" width="86" height="5" rx="2.5" fill="#ffffff" opacity="0.3"/>
    <rect x="12" y="48" width="100" height="5" rx="2.5" fill="#ffffff" opacity="0.25"/>
    <rect x="12" y="70" width="116" height="3" rx="1.5" fill="#0080ff" opacity="0.3"/>
    <rect x="12" y="82" width="95" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
    <rect x="12" y="94" width="105" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
    <rect x="12" y="106" width="80" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
    <rect x="12" y="126" width="116" height="3" rx="1.5" fill="#0080ff" opacity="0.3"/>
    <rect x="12" y="138" width="90" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
    <rect x="12" y="150" width="110" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
    <rect x="12" y="162" width="75" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- Arrow pipeline -->
  <g filter="url(#glow)" opacity="0.85">
    <line x1="195" y1="185" x2="255" y2="185" stroke="#0080ff" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="255,180 270,185 255,190" fill="#0080ff"/>
  </g>

  <!-- ATS funnel -->
  <g transform="translate(265, 80)" filter="url(#glow)">
    <polygon points="0,0 160,0 120,120 40,120" fill="url(#funnelGrad)" opacity="0.4"/>
    <polygon points="0,0 160,0 120,120 40,120" fill="none" stroke="#0080ff" stroke-width="1.5"/>
    <!-- Score bar -->
    <rect x="40" y="134" width="80" height="18" rx="9" fill="#001a3a" stroke="#ffd700" stroke-width="1.5"/>
    <rect x="44" y="137" width="60" height="12" rx="6" fill="#ffd700" opacity="0.8"/>
    <text x="80" y="148" font-family="system-ui,sans-serif" font-size="8" fill="#000" font-weight="700" text-anchor="middle">87%</text>
    <text x="80" y="172" font-family="system-ui,sans-serif" font-size="8" fill="#ffd700" text-anchor="middle" opacity="0.8">ATS SCORE</text>
    <!-- Funnel labels -->
    <text x="80" y="30" font-family="system-ui,sans-serif" font-size="8" fill="#0080ff" text-anchor="middle" opacity="0.7">PARSE</text>
    <text x="80" y="70" font-family="system-ui,sans-serif" font-size="8" fill="#0080ff" text-anchor="middle" opacity="0.7">SCORE</text>
    <text x="80" y="108" font-family="system-ui,sans-serif" font-size="8" fill="#ffd700" text-anchor="middle" opacity="0.8">RANK</text>
  </g>

  <!-- Arrow 2 -->
  <g filter="url(#glow)" opacity="0.85">
    <line x1="455" y1="185" x2="510" y2="185" stroke="#0080ff" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="510,180 525,185 510,190" fill="#0080ff"/>
  </g>

  <!-- Candidate ranking list (right) -->
  <g transform="translate(525, 90)" opacity="0.9">
    <rect x="0" y="0" width="200" height="240" rx="8" fill="#001a3a" stroke="#0080ff" stroke-width="1.5"/>
    <text x="100" y="22" font-family="system-ui,sans-serif" font-size="9" fill="#0080ff" opacity="0.7" text-anchor="middle" letter-spacing="1">CANDIDATES</text>
    <!-- Candidate rows -->
    <g transform="translate(12, 36)">
      <circle cx="12" cy="12" r="10" fill="#0080ff" opacity="0.3"/>
      <text x="12" y="16" font-family="system-ui,sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">1</text>
      <rect x="30" y="6" width="100" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
      <rect x="30" y="16" width="70" height="4" rx="2" fill="#ffd700" opacity="0.5"/>
      <rect x="144" y="4" width="32" height="18" rx="4" fill="#ffd700" opacity="0.2"/>
      <text x="160" y="16" font-family="monospace" font-size="8" fill="#ffd700" text-anchor="middle">94%</text>
    </g>
    <g transform="translate(12, 80)">
      <circle cx="12" cy="12" r="10" fill="#0080ff" opacity="0.2"/>
      <text x="12" y="16" font-family="system-ui,sans-serif" font-size="8" fill="#ffffff" opacity="0.6" text-anchor="middle">2</text>
      <rect x="30" y="6" width="110" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
      <rect x="30" y="16" width="80" height="4" rx="2" fill="#0080ff" opacity="0.4"/>
      <rect x="144" y="4" width="32" height="18" rx="4" fill="#0080ff" opacity="0.2"/>
      <text x="160" y="16" font-family="monospace" font-size="8" fill="#0080ff" opacity="0.8" text-anchor="middle">88%</text>
    </g>
    <g transform="translate(12, 124)">
      <circle cx="12" cy="12" r="10" fill="#0080ff" opacity="0.15"/>
      <text x="12" y="16" font-family="system-ui,sans-serif" font-size="8" fill="#ffffff" opacity="0.4" text-anchor="middle">3</text>
      <rect x="30" y="6" width="95" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
      <rect x="30" y="16" width="65" height="4" rx="2" fill="#0080ff" opacity="0.3"/>
      <rect x="144" y="4" width="32" height="18" rx="4" fill="#0080ff" opacity="0.15"/>
      <text x="160" y="16" font-family="monospace" font-size="8" fill="#0080ff" opacity="0.5" text-anchor="middle">79%</text>
    </g>
    <g transform="translate(12, 168)">
      <circle cx="12" cy="12" r="10" fill="#0080ff" opacity="0.1"/>
      <text x="12" y="16" font-family="system-ui,sans-serif" font-size="8" fill="#ffffff" opacity="0.3" text-anchor="middle">4</text>
      <rect x="30" y="6" width="100" height="6" rx="3" fill="#ffffff" opacity="0.1"/>
      <rect x="144" y="4" width="32" height="18" rx="4" fill="#0080ff" opacity="0.1"/>
      <text x="160" y="16" font-family="monospace" font-size="8" fill="#0080ff" opacity="0.35" text-anchor="middle">71%</text>
    </g>
    <g transform="translate(12, 212)">
      <circle cx="12" cy="12" r="10" fill="#0080ff" opacity="0.1"/>
      <text x="12" y="16" font-family="system-ui,sans-serif" font-size="8" fill="#ffffff" opacity="0.25" text-anchor="middle">5</text>
      <rect x="30" y="6" width="88" height="6" rx="3" fill="#ffffff" opacity="0.1"/>
    </g>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#0080ff" opacity="0.6" letter-spacing="2">AUTOFILE</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">AI RECRUITMENT ASSISTANT</text>
  <line x1="40" y1="375" x2="110" y2="375" stroke="#0080ff" stroke-width="1.5" opacity="0.5"/>
</svg>
