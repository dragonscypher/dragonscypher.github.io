<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="60%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#120e00"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- SLAM grid (top-down navigation map) -->
  <g opacity="0.15">
    <g stroke="#ff8c00" stroke-width="0.5">
      <line x1="80" y1="60" x2="720" y2="60"/><line x1="80" y1="110" x2="720" y2="110"/>
      <line x1="80" y1="160" x2="720" y2="160"/><line x1="80" y1="210" x2="720" y2="210"/>
      <line x1="80" y1="260" x2="720" y2="260"/><line x1="80" y1="310" x2="720" y2="310"/>
      <line x1="80" y1="360" x2="720" y2="360"/><line x1="80" y1="60" x2="80" y2="390"/>
      <line x1="160" y1="60" x2="160" y2="390"/><line x1="240" y1="60" x2="240" y2="390"/>
      <line x1="320" y1="60" x2="320" y2="390"/><line x1="400" y1="60" x2="400" y2="390"/>
      <line x1="480" y1="60" x2="480" y2="390"/><line x1="560" y1="60" x2="560" y2="390"/>
      <line x1="640" y1="60" x2="640" y2="390"/><line x1="720" y1="60" x2="720" y2="390"/>
    </g>
  </g>

  <!-- Navigation path (dotted route) -->
  <polyline points="160,320 160,260 240,260 240,210 320,210 320,160 400,160 480,160 480,110 560,110 560,160 640,160"
    fill="none" stroke="#ff8c00" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.8"/>

  <!-- Path waypoint dots -->
  <g filter="url(#glow)" fill="#ff8c00">
    <circle cx="160" cy="320" r="5" opacity="0.6"/>
    <circle cx="160" cy="260" r="5" opacity="0.7"/>
    <circle cx="240" cy="260" r="5" opacity="0.7"/>
    <circle cx="240" cy="210" r="5" opacity="0.8"/>
    <circle cx="320" cy="210" r="5" opacity="0.8"/>
    <circle cx="320" cy="160" r="5" opacity="0.9"/>
    <circle cx="400" cy="160" r="8"/>
    <circle cx="480" cy="160" r="5" opacity="0.9"/>
    <circle cx="480" cy="110" r="5" opacity="0.8"/>
    <circle cx="560" cy="110" r="5" opacity="0.7"/>
    <circle cx="560" cy="160" r="5" opacity="0.8"/>
    <circle cx="640" cy="160" r="5" opacity="0.7"/>
  </g>

  <!-- Current position indicator -->
  <g transform="translate(400, 160)" filter="url(#glow)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#ff8c00"/>
    <!-- Direction indicator -->
    <polygon points="0,-22 -5,-14 5,-14" fill="#ff8c00" opacity="0.8"/>
  </g>

  <!-- Object detection bounding boxes -->
  <g stroke="#ffd700" stroke-width="1.5" fill="none" opacity="0.7">
    <rect x="480" y="230" width="80" height="60" rx="2"/>
    <text x="482" y="225" font-family="monospace" font-size="7" fill="#ffd700">person 0.94</text>
    <rect x="220" y="280" width="60" height="50" rx="2"/>
    <text x="222" y="275" font-family="monospace" font-size="7" fill="#ffd700">door 0.87</text>
    <rect x="580" y="190" width="90" height="70" rx="2"/>
    <text x="582" y="185" font-family="monospace" font-size="7" fill="#ffd700">obstacle 0.91</text>
  </g>

  <!-- Depth scan lines (right side overlay) -->
  <g opacity="0.25">
    <line x1="400" y1="160" x2="500" y2="260" stroke="#ff8c00" stroke-width="1"/>
    <line x1="400" y1="160" x2="490" y2="240" stroke="#ff8c00" stroke-width="1"/>
    <line x1="400" y1="160" x2="470" y2="250" stroke="#ff8c00" stroke-width="1"/>
    <line x1="400" y1="160" x2="450" y2="260" stroke="#ff8c00" stroke-width="1"/>
    <line x1="400" y1="160" x2="430" y2="265" stroke="#ff8c00" stroke-width="1"/>
  </g>

  <!-- Compass rose -->
  <g transform="translate(700, 350)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ff8c00" stroke-width="1"/>
    <polygon points="0,-18 -4,-6 4,-6" fill="#ff8c00"/>
    <polygon points="0,18 -4,6 4,6" fill="#ff8c00" opacity="0.4"/>
    <polygon points="-18,0 -6,-4 -6,4" fill="#ff8c00" opacity="0.4"/>
    <polygon points="18,0 6,-4 6,4" fill="#ff8c00" opacity="0.4"/>
    <text x="0" y="-22" font-family="system-ui,sans-serif" font-size="7" fill="#ff8c00" text-anchor="middle">N</text>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#ff8c00" opacity="0.6" letter-spacing="2">VIZIO</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">AI NAVIGATION FOR VISUALLY IMPAIRED</text>
  <line x1="40" y1="375" x2="90" y2="375" stroke="#ff8c00" stroke-width="1.5" opacity="0.5"/>
</svg>
