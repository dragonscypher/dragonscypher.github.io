<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c22"/>
      <stop offset="60%" stop-color="#0d1b4a"/>
      <stop offset="100%" stop-color="#091535"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b7cf8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb700"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/><line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/><line x1="640" y1="0" x2="640" y2="450"/>
  </g>

  <!-- Audio waveform bars (center) -->
  <g filter="url(#glow)">
    <rect x="120" y="188" width="12" height="74" rx="6" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="142" y="162" width="12" height="126" rx="6" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="164" y="148" width="12" height="154" rx="6" fill="url(#waveGrad)"/>
    <rect x="186" y="170" width="12" height="110" rx="6" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="208" y="130" width="12" height="190" rx="6" fill="url(#waveGrad)"/>
    <rect x="230" y="155" width="12" height="140" rx="6" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="252" y="108" width="12" height="234" rx="6" fill="url(#waveGrad)"/>
    <rect x="274" y="135" width="12" height="180" rx="6" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="296" y="158" width="12" height="134" rx="6" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="318" y="118" width="12" height="214" rx="6" fill="url(#waveGrad)"/>
    <rect x="340" y="145" width="12" height="160" rx="6" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="362" y="170" width="12" height="110" rx="6" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="384" y="128" width="12" height="194" rx="6" fill="url(#waveGrad)"/>
    <rect x="406" y="152" width="12" height="146" rx="6" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="428" y="140" width="12" height="170" rx="6" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="450" y="108" width="12" height="234" rx="6" fill="url(#waveGrad)"/>
    <rect x="472" y="158" width="12" height="134" rx="6" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="494" y="172" width="12" height="106" rx="6" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="516" y="148" width="12" height="154" rx="6" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="538" y="185" width="12" height="80" rx="6" fill="url(#waveGrad)" opacity="0.5"/>
  </g>

  <!-- Book/page icon (right side) -->
  <g transform="translate(620, 150)" opacity="0.9">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <rect x="6" y="6" width="108" height="138" rx="6" fill="#0d1b4a" opacity="0.8"/>
    <line x1="60" y1="6" x2="60" y2="144" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <rect x="16" y="24" width="76" height="2" rx="1" fill="#00d4ff" opacity="0.5"/>
    <rect x="16" y="36" width="60" height="2" rx="1" fill="#00d4ff" opacity="0.35"/>
    <rect x="16" y="48" width="70" height="2" rx="1" fill="#00d4ff" opacity="0.35"/>
    <rect x="16" y="60" width="50" height="2" rx="1" fill="#7b7cf8" opacity="0.4"/>
    <rect x="16" y="80" width="76" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>
    <rect x="16" y="92" width="65" height="2" rx="1" fill="#00d4ff" opacity="0.25"/>
    <rect x="16" y="104" width="72" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>
  </g>

  <!-- AI network nodes -->
  <g filter="url(#glow)" opacity="0.85">
    <circle cx="630" cy="350" r="8" fill="url(#nodeGrad)"/>
    <circle cx="680" cy="320" r="6" fill="url(#nodeGrad)" opacity="0.8"/>
    <circle cx="720" cy="360" r="10" fill="url(#nodeGrad)"/>
    <circle cx="700" cy="390" r="5" fill="url(#nodeGrad)" opacity="0.7"/>
    <circle cx="650" cy="385" r="7" fill="url(#nodeGrad)" opacity="0.9"/>
    <line x1="630" y1="350" x2="680" y2="320" stroke="#ffb700" stroke-width="1" opacity="0.5"/>
    <line x1="680" y1="320" x2="720" y2="360" stroke="#ffb700" stroke-width="1" opacity="0.5"/>
    <line x1="720" y1="360" x2="700" y2="390" stroke="#ffb700" stroke-width="1" opacity="0.4"/>
    <line x1="700" y1="390" x2="650" y2="385" stroke="#ffb700" stroke-width="1" opacity="0.4"/>
    <line x1="650" y1="385" x2="630" y2="350" stroke="#ffb700" stroke-width="1" opacity="0.5"/>
    <line x1="630" y1="350" x2="720" y2="360" stroke="#ffb700" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Labels -->
  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#00d4ff" opacity="0.6" letter-spacing="2">OUTLOUD</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">AI AUDIOBOOK GENERATOR</text>

  <!-- Accent line -->
  <line x1="40" y1="375" x2="120" y2="375" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
</svg>
