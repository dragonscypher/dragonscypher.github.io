<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="60%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="tabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Browser tabs (scattered left) -->
  <g opacity="0.75">
    <!-- Tab 1 -->
    <rect x="60" y="80" width="130" height="90" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="60" y="80" width="130" height="22" rx="8" fill="url(#tabGrad)"/>
    <rect x="68" y="88" width="60" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
    <rect x="68" y="112" width="94" height="4" rx="2" fill="#8b5cf6" opacity="0.4"/>
    <rect x="68" y="124" width="75" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <rect x="68" y="136" width="85" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <!-- Tab 2 -->
    <rect x="90" y="200" width="120" height="80" rx="8" fill="#1a1a2e" stroke="#6d28d9" stroke-width="1.5"/>
    <rect x="90" y="200" width="120" height="22" rx="8" fill="#6d28d9" opacity="0.7"/>
    <rect x="98" y="208" width="55" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
    <rect x="98" y="230" width="88" height="4" rx="2" fill="#8b5cf6" opacity="0.35"/>
    <rect x="98" y="242" width="72" height="4" rx="2" fill="#8b5cf6" opacity="0.25"/>
    <!-- Tab 3 -->
    <rect x="50" y="310" width="110" height="75" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
    <rect x="50" y="310" width="110" height="20" rx="8" fill="#8b5cf6" opacity="0.4"/>
    <rect x="58" y="340" width="80" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <rect x="58" y="352" width="65" height="4" rx="2" fill="#8b5cf6" opacity="0.2"/>
  </g>

  <!-- MCP server node (center) -->
  <g transform="translate(340, 160)" filter="url(#glow)">
    <circle cx="60" cy="80" r="55" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <circle cx="60" cy="80" r="42" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="60" cy="80" r="18" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
    <text x="60" y="84" font-family="monospace" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="700">MCP</text>
    <!-- Connection spokes -->
    <line x1="60" y1="25" x2="60" y2="38" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="122" x2="60" y2="135" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="80" x2="20" y2="80" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="100" y1="80" x2="110" y2="80" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="24" y1="44" x2="32" y2="52" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="96" y1="44" x2="88" y2="52" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Connection lines from tabs to node -->
  <g stroke="#8b5cf6" stroke-width="1" stroke-dasharray="5 3" opacity="0.4">
    <line x1="190" y1="125" x2="340" y2="200"/>
    <line x1="210" y1="240" x2="340" y2="230"/>
    <line x1="160" y1="347" x2="340" y2="270"/>
  </g>

  <!-- Grouped result (right side) -->
  <g transform="translate(520, 130)" opacity="0.85">
    <rect x="0" y="0" width="210" height="50" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="8" y="10" width="30" height="30" rx="4" fill="url(#tabGrad)" opacity="0.7"/>
    <rect x="46" y="14" width="100" height="6" rx="3" fill="#ffffff" opacity="0.35"/>
    <rect x="46" y="26" width="75" height="4" rx="2" fill="#8b5cf6" opacity="0.4"/>
    <text x="190" y="30" font-family="system-ui,sans-serif" font-size="9" fill="#8b5cf6" opacity="0.7">3</text>

    <rect x="0" y="62" width="210" height="50" rx="8" fill="none" stroke="#6d28d9" stroke-width="1.5"/>
    <rect x="8" y="72" width="30" height="30" rx="4" fill="#6d28d9" opacity="0.5"/>
    <rect x="46" y="76" width="110" height="6" rx="3" fill="#ffffff" opacity="0.3"/>
    <rect x="46" y="88" width="80" height="4" rx="2" fill="#8b5cf6" opacity="0.35"/>
    <text x="190" y="92" font-family="system-ui,sans-serif" font-size="9" fill="#8b5cf6" opacity="0.6">5</text>

    <rect x="0" y="124" width="210" height="50" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
    <rect x="8" y="134" width="30" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
    <rect x="46" y="138" width="95" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
    <rect x="46" y="150" width="70" height="4" rx="2" fill="#8b5cf6" opacity="0.3"/>
    <text x="190" y="154" font-family="system-ui,sans-serif" font-size="9" fill="#8b5cf6" opacity="0.5">2</text>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#8b5cf6" opacity="0.6" letter-spacing="2">GROUPEM</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">SECURE BROWSER TAB GROUPING</text>
  <line x1="40" y1="375" x2="110" y2="375" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
</svg>
