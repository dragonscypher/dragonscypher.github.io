<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020f07"/>
      <stop offset="60%" stop-color="#061a0e"/>
      <stop offset="100%" stop-color="#041210"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#00e676" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- X-ray ribcage (center-left, inverted/high contrast) -->
  <g transform="translate(70, 60)" opacity="0.85" filter="url(#glow)">
    <!-- Spine -->
    <rect x="155" y="20" width="14" height="300" rx="7" fill="#e0e8ff" opacity="0.12"/>
    <g fill="none" stroke="#e0e8ff" stroke-width="1.2" opacity="0.18">
      <rect x="148" y="30" width="28" height="18" rx="4"/>
      <rect x="148" y="58" width="28" height="18" rx="4"/>
      <rect x="148" y="86" width="28" height="18" rx="4"/>
      <rect x="148" y="114" width="28" height="18" rx="4"/>
      <rect x="148" y="142" width="28" height="18" rx="4"/>
      <rect x="148" y="170" width="28" height="18" rx="4"/>
      <rect x="148" y="198" width="28" height="18" rx="4"/>
      <rect x="148" y="226" width="28" height="18" rx="4"/>
      <rect x="148" y="254" width="28" height="18" rx="4"/>
    </g>
    <!-- Ribs left -->
    <g fill="none" stroke="#c8e0ff" stroke-width="2" opacity="0.35">
      <path d="M148,42 Q100,42 70,80 Q50,120 60,155"/>
      <path d="M148,70 Q95,70 65,110 Q42,148 50,185"/>
      <path d="M148,98 Q92,100 62,140 Q38,178 45,215"/>
      <path d="M148,126 Q92,128 64,168 Q40,205 48,240"/>
      <path d="M148,154 Q95,156 68,195 Q46,232 54,260"/>
      <path d="M148,182 Q100,183 76,218 Q56,252 64,275"/>
      <path d="M148,210 Q106,210 84,242 Q68,268 76,285"/>
    </g>
    <!-- Ribs right -->
    <g fill="none" stroke="#c8e0ff" stroke-width="2" opacity="0.35">
      <path d="M176,42 Q224,42 254,80 Q274,120 264,155"/>
      <path d="M176,70 Q229,70 259,110 Q282,148 274,185"/>
      <path d="M176,98 Q232,100 262,140 Q286,178 279,215"/>
      <path d="M176,126 Q232,128 260,168 Q284,205 276,240"/>
      <path d="M176,154 Q229,156 256,195 Q278,232 270,260"/>
      <path d="M176,182 Q224,183 248,218 Q268,252 260,275"/>
      <path d="M176,210 Q218,210 240,242 Q256,268 248,285"/>
    </g>
  </g>

  <!-- Dashboard panel (right side) -->
  <g transform="translate(390, 50)" opacity="0.9">
    <!-- Header bar -->
    <rect x="0" y="0" width="370" height="36" rx="8" fill="#061a0e" stroke="#00e676" stroke-width="1.5"/>
    <text x="14" y="23" font-family="monospace" font-size="10" fill="#00e676" opacity="0.8">RAYZ — Radiology Report AI</text>
    <circle cx="346" cy="18" r="6" fill="#00e676" opacity="0.6"/>

    <!-- Report sections -->
    <rect x="0" y="48" width="370" height="120" rx="6" fill="#040e08" stroke="#00e676" stroke-width="1" opacity="0.8"/>
    <text x="14" y="70" font-family="monospace" font-size="8" fill="#00e676" opacity="0.6">FINDINGS</text>
    <rect x="14" y="78" width="280" height="5" rx="2.5" fill="#00e676" opacity="0.3"/>
    <rect x="14" y="91" width="240" height="4" rx="2" fill="#00e676" opacity="0.2"/>
    <rect x="14" y="103" width="260" height="4" rx="2" fill="#00e676" opacity="0.2"/>
    <rect x="14" y="115" width="200" height="4" rx="2" fill="#00e676" opacity="0.15"/>
    <text x="14" y="142" font-family="monospace" font-size="8" fill="#00e676" opacity="0.5">IMPRESSION: No acute cardiopulmonary process.</text>
    <text x="14" y="157" font-family="monospace" font-size="8" fill="#00e676" opacity="0.35">Confidence: 0.924 | RAG retrieved 12 cases</text>

    <!-- AUROC curve -->
    <rect x="0" y="180" width="175" height="145" rx="6" fill="#040e08" stroke="#00e676" stroke-width="1" opacity="0.8"/>
    <text x="14" y="200" font-family="monospace" font-size="8" fill="#00e676" opacity="0.6">AUROC</text>
    <g transform="translate(14, 210)">
      <line x1="0" y1="100" x2="0" y2="0" stroke="#00e676" stroke-width="0.8" opacity="0.3"/>
      <line x1="0" y1="100" x2="145" y2="100" stroke="#00e676" stroke-width="0.8" opacity="0.3"/>
      <path d="M0,100 Q20,60 40,40 Q70,15 100,8 Q120,4 145,0" fill="none" stroke="#00e676" stroke-width="2"/>
      <path d="M0,100 L145,0" fill="none" stroke="#00e676" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.3"/>
      <text x="50" y="95" font-family="monospace" font-size="8" fill="#00e676" opacity="0.6">AUC=0.96</text>
    </g>

    <!-- Class heatmap / confidence bars -->
    <rect x="187" y="180" width="183" height="145" rx="6" fill="#040e08" stroke="#00e676" stroke-width="1" opacity="0.8"/>
    <text x="201" y="200" font-family="monospace" font-size="8" fill="#00e676" opacity="0.6">CONFIDENCE</text>
    <g transform="translate(201, 210)">
      <rect x="0" y="0" width="115" height="11" rx="2" fill="#00e676" opacity="0.8"/>
      <text x="120" y="9" font-family="monospace" font-size="7" fill="#00e676">0.92</text>
      <rect x="0" y="18" width="95" height="11" rx="2" fill="#00e676" opacity="0.65"/>
      <text x="100" y="27" font-family="monospace" font-size="7" fill="#00e676">0.76</text>
      <rect x="0" y="36" width="80" height="11" rx="2" fill="#00e676" opacity="0.5"/>
      <text x="85" y="45" font-family="monospace" font-size="7" fill="#00e676">0.64</text>
      <rect x="0" y="54" width="60" height="11" rx="2" fill="#00e676" opacity="0.35"/>
      <text x="65" y="63" font-family="monospace" font-size="7" fill="#00e676">0.48</text>
      <rect x="0" y="72" width="40" height="11" rx="2" fill="#00e676" opacity="0.2"/>
      <text x="45" y="81" font-family="monospace" font-size="7" fill="#00e676">0.32</text>
      <rect x="0" y="90" width="20" height="11" rx="2" fill="#00e676" opacity="0.1"/>
    </g>
  </g>

  <text x="40" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#00e676" opacity="0.6" letter-spacing="2">RAYZ</text>
  <text x="40" y="408" font-family="system-ui,sans-serif" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1">CHEST X-RAY AI · RAG + SLM</text>
  <line x1="40" y1="375" x2="80" y2="375" stroke="#00e676" stroke-width="1.5" opacity="0.5"/>
</svg>
